<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FAZZBEAR - פרויקט</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
      body, html {
        height: 100%;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background-color: #0b0b0b;
        color: #ddd;
      }
      .bg-fnaf {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: url('fnaf-bg.jpg') no-repeat center center/cover;
        filter: brightness(0.25);
        z-index: -1;
      }
      main {
        padding-top: 100px;
        text-align: center;
      }
      footer {
        background-color: rgba(0, 0, 0, 0.7);
        color: #ffb300;
        padding: 10px 0;
      }
      .btn-back {
        margin-top: 25px;
        background-color: #d32f2f;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        transition: all 0.3s;
      }
      .btn-back:hover {
        background-color: #ff0000;
      }
    </style>
  </head>
  <body>
    <div class="bg-fnaf"></div>

    <!-- נוויגציה עם שם הפרויקט הקבוע -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRFWHp2AcnC8fUUINvl9Kfg-VShKnbWJ2zl2g&s"
               alt="Fazzbear Logo" class="ms-2" style="height:34px" />
          FAZZBEAR פרויקט
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <!-- מוסיפים data-protected כדי שנוכל לחסום -->
            <li class="nav-item"><a class="nav-link" href="index.html" data-protected="true">דף הבית</a></li>
            <li class="nav-item"><a class="nav-link" href="robots.html" data-protected="true">הרובוטים</a></li>
            <li class="nav-item"><a class="nav-link" href="security.html" data-protected="true">על הפרויקט</a></li>
            <li class="nav-item"><a class="nav-link active" href="contact.html">צור קשר</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container">
      <h1 class="mb-4 text-warning">צור קשר עם צוות FAZZBEAR</h1>
      <p>נשמח לשמוע ממך על הרובוטים, הפיצריה או השומר הלילי!</p>

      <!-- כפתור חזרה לבית -->
      <a href="index.html" class="btn btn-back" data-protected="true">חזרה לבית</a>
    </main>

    <footer class="text-center mt-5">
      © <span data-year></span> FAZZBEAR ENTERTAINMENT - כל הזכויות שמורות
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <!-- אם צריך גם DB, תוסיף כאן database.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      // עדכון השנה בפוטר
      document.querySelectorAll('[data-year]').forEach(el => el.textContent = new Date().getFullYear());

      // ======================
      // Firebase V8 Config
      // ======================
      const firebaseConfig = {
        apiKey: "AIzaSyDg7b8jru0rOx2EGfeSoewcu1wHAFynSHs",
        authDomain: "project-shalty.firebaseapp.com",
        databaseURL: "https://project-shalty-default-rtdb.firebaseio.com",
        projectId: "project-shalty",
        storageBucket: "project-shalty.firebasestorage.app",
        messagingSenderId: "984471122116",
        appId: "1:984471122116:web:8f958b467378fd19475991"
      };

      // Initialize Firebase (V8)
      firebase.initializeApp(firebaseConfig);

      // כל הלינקים המוגנים בדף הזה
      const protectedLinks = document.querySelectorAll('a[data-protected="true"]');
      let isAuthenticated = false;

      // ברירת מחדל – לחסום ניווט אם לא מחובר
      protectedLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          if (!isAuthenticated) {
            e.preventDefault();
            // מפנה אותו ישר לדף האימות (contact.html שלך / login.html)
            window.location.href = 'contact.html';
          }
        });
      });

      // ======================
      // בדיקת התחברות בעומס דף
      // ======================
      firebase.auth().onAuthStateChanged((user) => {
        if (user) {
          console.log('👤 משתמש מחובר:', user.email);
          isAuthenticated = true;
          // אם תרצה שמי שכבר מחובר לא יגיע לכאן בכלל:
          // window.location.href = 'index.html';
        } else {
          console.log('👤 משתמש לא מחובר – מפנה לאימות');
          isAuthenticated = false;
          // דף זה מוגן לגמרי – אם מישהו נכנס אליו בלי התחברות, מפנים אותו
          window.location.href = 'contact.html'; // או login.html
        }
      });
    </script>
  </body>
</html>
