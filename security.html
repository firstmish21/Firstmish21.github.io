<!-- טעינת Firebase מרחוק -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
 
    // --- הגדרות אישיות (חובה למלא!) ---
    const ANTHROPIC_API_KEY = "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";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDg7b8jru0rOx2EGfeSoewcu1wHAFynSHs",
        authDomain: "project-shalty.firebaseapp.com",
        databaseURL: "https://project-shalty-default-rtdb.firebaseio.com",
        projectId: "project-shalty",
        storageBucket: "project-shalty.firebasestorage.app",
        messagingSenderId: "984471122116",
        appId: "1:984471122116:web:8f958b467378fd19475991"
    };
 
    // אתחול Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
 
    // --- לוגיקה של ה-AI ---
    async function callCharacterAI(userText) {
        const analysisContent = document.getElementById('analysisContent');
        analysisContent.innerHTML = "מנתח נתונים... <br>[SCANNING FREQUENCIES]";
 
        try {
            const response = await fetch("https://api.anthropic.com/v1/messages", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': ANTHROPIC_API_KEY,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: "claude-haiku-4-5-20251001",
                    max_tokens: 1000,
                    system: `אתה ה-AI של חדר האבטחה בפיצרייה של פאזבייר. 
                             ענה בעברית בטון קריפי, טכנולוגי ומסתורי. 
                             תשלב מדי פעם מילים כמו [ERROR], [STATIC] או [MOVEMENT DETECTED]. 
                             אל תגיד שאתה AI, אתה חלק מהמערכת של המקום.`,
                    messages: [{ role: "user", content: userText }]
                })
            });
 
            const result = await response.json();
 
            if (!response.ok || !result.content || result.content.length === 0) {
                const reason = result?.error?.message || `HTTP ${response.status}`;
                analysisContent.textContent = `[SYSTEM OVERLOAD]: ${reason}`;
                return;
            }
 
            const aiReply = result.content[0].text;
 
            analysisContent.textContent = aiReply;
            speakText(aiReply);
 
            // שמירה ל-Firebase
            push(ref(db, 'security_logs'), {
                timestamp: Date.now(),
                prompt: userText,
                response: aiReply
            });
 
        } catch (error) {
            console.error("AI Error:", error);
            analysisContent.textContent = "[CRITICAL ERROR]: הגישה לשרת נחסמה על ידי גורם לא ידוע.";
        }
    }
 
    // --- זיהוי קולי ---
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'he-IL';
 
    document.getElementById('micBtn').addEventListener('click', function() {
        recognition.start();
        this.classList.add('listening');
    });
 
    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        document.getElementById('transcript').textContent = "קלט קולי: " + text;
        document.getElementById('micBtn').classList.remove('listening');
        callCharacterAI(text);
    };
 
    // --- הקראת טקסט ---
    function speakText(text) {
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = 'he-IL';
        speech.pitch = 0.7; // קול עמוק
        speech.rate = 0.9;  // קצב מעט איטי
        window.speechSynthesis.speak(speech);
    }
 
    // --- כפתור שליחה ידני ---
    document.getElementById('analyzeBtn').addEventListener('click', () => {
        const val = document.getElementById('analysisPrompt').value;
        if(val) {
            callCharacterAI(val);
            document.getElementById('analysisPrompt').value = "";
        }
    });
 
    // שעון מערכת בצד
    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }, 1000);
</script>
